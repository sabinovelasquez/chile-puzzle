<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chile Puzzle Explorer - Admin panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Chile Puzzle Content Admin</h1>
            <p>Manage in-game locations and dynamic content (ES / EN)</p>
        </header>
        
        <div class="dashboard">
            <aside class="sidebar">
                <button id="addLocationBtn" class="btn primary">Add New Location</button>
                <div id="locationList" class="location-list">
                    <!-- Loaded dynamically -->
                </div>
            </aside>
            
            <main class="editor-area">
                <form id="editorForm" class="hidden">
                    <h2>Edit Location</h2>
                    
                    <div class="form-group">
                        <label>ID (Unique string)</label>
                        <input type="text" id="locId" placeholder="ej: valle_de_la_luna" required>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Name (English)</label>
                            <input type="text" id="locNameEn" required>
                        </div>
                        <div class="form-group">
                            <label>Name (Spanish)</label>
                            <input type="text" id="locNameEs" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Region</label>
                        <input type="text" id="locRegion" required>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Latitude</label>
                            <input type="number" step="any" id="locLat" required>
                        </div>
                        <div class="form-group">
                            <label>Longitude</label>
                            <input type="number" step="any" id="locLng" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>High-Res Image URL</label>
                        <input type="url" id="locImage" required>
                    </div>
                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input type="url" id="locThumbnail" required>
                    </div>

                    <div class="form-group">
                        <label>Post-Puzzle Tip (English)</label>
                        <textarea id="locTipEn" rows="2" maxlength="200" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Post-Puzzle Tip (Spanish)</label>
                        <textarea id="locTipEs" rows="2" maxlength="200" required></textarea>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn success">Save Location</button>
                        <button type="button" id="deleteLocationBtn" class="btn danger">Delete</button>
                    </div>
                </form>
                <div id="emptyState" class="empty-state">
                    <p>Select a location from the sidebar or add a new one to begin editing.</p>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
